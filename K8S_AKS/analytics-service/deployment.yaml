apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: toggle-apps
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: fiapdevopsadegj.azurecr.io/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8005
          envFrom:
            - configMapRef:
                name: analytics-service-config
          env:
            - name: SERVICE_BUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: SERVICE_BUS_CONNECTION_STRING
            - name: COSMOS_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-service-secret
                  key: COSMOS_KEY
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 20
