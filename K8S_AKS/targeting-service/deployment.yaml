apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: toggle-apps
  labels:
    app: targeting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
        - name: targeting-service
          image: fiapdevopsadegj.azurecr.io/targeting-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8003
          envFrom:
            - configMapRef:
                name: targeting-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 20
