apiVersion: batch/v1
kind: Job
metadata:
  name: flag-migrate
  namespace: toggle-apps
  labels:
    app: flag-service
    role: migration
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: flag-service
        role: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16
          command: ["sh", "-c", "psql \"$DATABASE_URL\" -v ON_ERROR_STOP=1 -f /sql/init.sql"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: flag-initsql
